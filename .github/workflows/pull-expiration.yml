name: Pull Slickdeals Expiration Status

on:
  repository_dispatch:
    types: [trigger-expiration-pull]
  workflow_dispatch: {}

# This workflow does one page fetch per unexpired deal, so a run can take a
# while. cancel-in-progress: false means a new run never interrupts one
# already in progress -- it queues and waits its turn instead. This is its
# own concurrency group, separate from pull-slickdeals, so it never blocks
# (or gets blocked by) the 15-minute deals pull.
concurrency:
  group: pull-slickexpiration
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Check deal expiration
        run: python pull_slickexpiration.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add expired.xml
          if git diff --cached --quiet -- expired.xml; then
            echo "No changes to expired.xml -- skipping commit."
          else
            git commit -m "Update expired.xml [skip ci]"
            # Deals and Expiration run in separate concurrency groups, so
            # they can push around the same time. Rebase onto whatever the
            # other one just pushed before trying, so this doesn't get
            # rejected as a non-fast-forward push.
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)"
            git push
          fi

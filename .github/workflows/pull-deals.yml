name: Pull Slickdeals Hot Deals

on:
  repository_dispatch:
    types: [trigger-deals-pull]
  workflow_dispatch: {}

# This workflow runs often (every 15 min, triggered externally) and each
# run is fast/cheap, so if runs start backing up (e.g. a slow feed
# response) we just cancel the older, now-stale run rather than letting a
# queue build up. This is its own concurrency group, separate from
# Expiration, so a busy Slickdeals run never blocks or gets blocked by it.
concurrency:
  group: pull-slickdeals
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Pull latest deals
        run: python pull_slickdeals.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deals.xml
          if git diff --cached --quiet -- deals.xml; then
            echo "No changes to deals.xml -- skipping commit."
          else
            git commit -m "Update deals.xml [skip ci]"
            # Deals and Expiration run in separate concurrency groups, so
            # they can push around the same time. Rebase onto whatever the
            # other one just pushed before trying, so this doesn't get
            # rejected as a non-fast-forward push.
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)"
            git push
          fi

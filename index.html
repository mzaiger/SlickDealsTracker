<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot Deals Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #14110F;
    --panel:     #1D1913;
    --line:      #33291D;
    --text:      #EDE6DA;
    --text-dim:  #8A8272;
    --amber:     #F2A93B;
    --cool:      #2FB8A6;
    --hot:       #E4572E;
    --radius:    10px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 15% 0%, rgba(242,169,59,0.08), transparent 45%),
      radial-gradient(circle at 85% 10%, rgba(228,87,46,0.06), transparent 40%);
  }

  header {
    padding: 40px 24px 24px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--amber);
    margin: 0 0 10px;
  }

  h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    font-size: clamp(32px, 6vw, 52px);
    line-height: 1;
    margin: 0 0 8px;
  }

  .sub {
    color: var(--text-dim);
    font-size: 14px;
    margin: 0;
  }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin: 8px 0 28px;
    position: sticky;
    top: 0;
    padding: 16px 0;
    background: linear-gradient(var(--bg) 78%, transparent);
    z-index: 10;
  }

  .tabs {
    display: flex;
    gap: 6px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 4px;
  }

  .tab-btn {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-size: 13px;
    color: var(--text-dim);
    background: transparent;
    border: none;
    border-radius: 999px;
    padding: 9px 18px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }

  .tab-btn:hover { color: var(--text); }

  .tab-btn.active {
    background: var(--amber);
    color: #1A1305;
  }

  .sort {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }

  .sort-btn {
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 7px 12px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease;
  }

  .sort-btn.active {
    border-color: var(--amber);
    color: var(--amber);
  }

  .count {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text-dim);
    font-size: 12px;
    margin: -16px 0 20px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .card {
    display: block;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s ease, transform 0.15s ease;
  }

  .card:hover {
    border-color: var(--amber);
    transform: translateY(-2px);
  }

  .thumb-wrap {
    position: relative;
    aspect-ratio: 16 / 10;
    background: #0F0D0A;
    overflow: hidden;
  }

  .thumb-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .thumb-fallback {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .rating-pill {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    align-items: center;
    gap: 4px;
    background: rgba(20, 17, 15, 0.85);
    backdrop-filter: blur(2px);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 4px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
  }

  .body { padding: 14px 16px 16px; }

  .heat-meter {
    height: 4px;
    border-radius: 2px;
    background: var(--line);
    overflow: hidden;
    margin-bottom: 12px;
  }

  .heat-fill {
    height: 100%;
    border-radius: 2px;
  }

  .heat-fill.hot { box-shadow: 0 0 8px var(--hot); animation: pulse 1.8s ease-in-out infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .title {
    font-size: 14.5px;
    line-height: 1.35;
    font-weight: 500;
    margin: 0 0 10px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    color: var(--text-dim);
  }

  .meta .go {
    color: var(--amber);
  }

  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }

  @media (prefers-reduced-motion: reduce) {
    .heat-fill.hot { animation: none; }
    .card { transition: none; }
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Slickdeals · Frontpage · Auto-refreshed every 15 min</p>
  <h1>Hot Deals Board</h1>
  <p class="sub">Deal heat = current thumbs-up score. Click any card to open the Slickdeals post.</p>
</header>

<main>
  <div class="controls">
    <div class="tabs" id="tabs">
      <button class="tab-btn" data-hours="2">2 Hours</button>
      <button class="tab-btn" data-hours="5">5 Hours</button>
      <button class="tab-btn" data-hours="24">24 Hours</button>
      <button class="tab-btn" data-hours="48">48 Hours</button>
    </div>
    <div class="sort">
      <span>Sort</span>
      <button class="sort-btn" data-sort="date">Newest</button>
      <button class="sort-btn" data-sort="rating">Rating</button>
    </div>
  </div>

  <p class="count" id="count"></p>
  <div class="grid" id="grid"></div>
</main>

<script>
const DATA_URL = 'deals.xml';

let allDeals = [];
let activeHours = 2;
let activeSort = 'date';

async function loadDeals() {
  const res = await fetch(DATA_URL, { cache: 'no-store' });
  const text = await res.text();
  const xml = new DOMParser().parseFromString(text, 'application/xml');

  const parseErr = xml.querySelector('parsererror');
  if (parseErr) {
    console.error('Failed to parse deals.xml', parseErr.textContent);
    return [];
  }

  return Array.from(xml.querySelectorAll('deal')).map(el => {
    const get = tag => (el.querySelector(tag)?.textContent || '').trim();
    const rating = parseInt(get('rating'), 10);
    return {
      title: get('title'),
      link: get('link'),
      thumbnail: get('thumbnail'),
      rating: Number.isFinite(rating) ? rating : 0,
      pubDateIso: get('pubDateIso'),
    };
  }).filter(d => d.link && d.pubDateIso);
}

function heatClass(rating) {
  if (rating >= 50) return 'hot';
  if (rating >= 20) return 'warm';
  return 'cool';
}

function heatColor(rating) {
  if (rating >= 50) return 'var(--hot)';
  if (rating >= 20) return 'var(--amber)';
  return 'var(--cool)';
}

function relativeTime(iso) {
  const then = new Date(iso).getTime();
  const diffMin = Math.max(0, Math.round((Date.now() - then) / 60000));
  if (diffMin < 60) return `${diffMin}m ago`;
  const diffHr = Math.floor(diffMin / 60);
  if (diffHr < 24) return `${diffHr}h ${diffMin % 60}m ago`;
  const diffDay = Math.floor(diffHr / 24);
  return `${diffDay}d ${diffHr % 24}h ago`;
}

function render() {
  const cutoff = Date.now() - activeHours * 60 * 60 * 1000;
  let visible = allDeals.filter(d => new Date(d.pubDateIso).getTime() >= cutoff);

  visible.sort((a, b) => {
    if (activeSort === 'rating') return b.rating - a.rating;
    return new Date(b.pubDateIso) - new Date(a.pubDateIso);
  });

  const grid = document.getElementById('grid');
  const count = document.getElementById('count');
  count.textContent = `${visible.length} deal${visible.length === 1 ? '' : 's'} in the last ${activeHours}h`;

  if (visible.length === 0) {
    grid.innerHTML = `<div class="empty" style="grid-column: 1 / -1;">No deals in this window yet. The feed updates every 15 minutes.</div>`;
    return;
  }

  grid.innerHTML = visible.map(d => {
    const pct = Math.min(100, Math.max(6, d.rating));
    const hClass = heatClass(d.rating);
    const hColor = heatColor(d.rating);
    const thumbHtml = d.thumbnail
      ? `<img src="${d.thumbnail}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=&quot;thumb-fallback&quot;>No Image</div>'">`
      : `<div class="thumb-fallback">No Image</div>`;

    return `
      <a class="card" href="${d.link}" target="_blank" rel="noopener noreferrer">
        <div class="thumb-wrap">
          ${thumbHtml}
          <div class="rating-pill">▲ ${d.rating}</div>
        </div>
        <div class="body">
          <div class="heat-meter"><div class="heat-fill ${hClass}" style="width:${pct}%; background:${hColor};"></div></div>
          <p class="title">${d.title}</p>
          <div class="meta">
            <span>${relativeTime(d.pubDateIso)}</span>
            <span class="go">View deal ↗</span>
          </div>
        </div>
      </a>
    `;
  }).join('');
}

function setupControls() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    if (parseInt(btn.dataset.hours, 10) === activeHours) btn.classList.add('active');
    btn.addEventListener('click', () => {
      activeHours = parseInt(btn.dataset.hours, 10);
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
      render();
    });
  });

  document.querySelectorAll('.sort-btn').forEach(btn => {
    if (btn.dataset.sort === activeSort) btn.classList.add('active');
    btn.addEventListener('click', () => {
      activeSort = btn.dataset.sort;
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b === btn));
      render();
    });
  });
}

(async function init() {
  setupControls();
  allDeals = await loadDeals();
  render();
  // Pick up new commits from the workflow without a manual reload.
  setInterval(async () => {
    allDeals = await loadDeals();
    render();
  }, 5 * 60 * 1000);
})();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slick Deals Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #FFFFFF;
    --panel:     #F2F7FD;
    --line:      #D9E5F2;
    --text:      #10233F;
    --text-dim:  #64798E;
    --blue:      #1B63E0;
    --blue-deep: #0C3F94;
    --cool:      #2FA8B8;
    --warm:      #F2A93B;
    --hot:       #E4572E;
    --radius:    10px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 12% 0%, rgba(27,99,224,0.07), transparent 45%),
      radial-gradient(circle at 88% 6%, rgba(27,99,224,0.05), transparent 40%);
  }

  header {
    padding: 40px 24px 20px;
    max-width: 1700px;
    margin: 0 auto;
  }

  .eyebrow-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--blue);
    margin: 0;
  }

  .updated-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }

  .refresh-btn {
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--blue);
    border-radius: 6px;
    padding: 5px 10px;
    font-family: inherit;
    font-size: 11.5px;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .refresh-btn:hover { border-color: var(--blue); background: #E9F1FD; }
  .refresh-btn:disabled { opacity: 0.5; cursor: default; }

  h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    font-size: clamp(32px, 6vw, 52px);
    line-height: 1;
    margin: 0 0 8px;
    color: var(--text);
  }

  .sub {
    color: var(--text-dim);
    font-size: 14px;
    margin: 0;
  }

  main {
    max-width: 1700px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin: 8px 0 28px;
    position: sticky;
    top: 0;
    padding: 16px 0;
    background: linear-gradient(var(--bg) 78%, transparent);
    z-index: 10;
  }

  .tabs {
    display: flex;
    gap: 6px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 4px;
  }

  .tab-btn {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-size: 13px;
    color: var(--text-dim);
    background: transparent;
    border: none;
    border-radius: 999px;
    padding: 9px 18px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }

  .tab-btn:hover { color: var(--text); }

  .tab-btn.active {
    background: var(--blue);
    color: #FFFFFF;
  }

  .sort {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }

  .sort-btn {
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 7px 12px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease;
  }

  .sort-btn.active {
    border-color: var(--blue);
    color: var(--blue);
  }

  .count {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text-dim);
    font-size: 12px;
    margin: -16px 0 20px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .card {
    display: block;
    background: #FFFFFF;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 1px 2px rgba(16,35,63,0.04);
    transition: border-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
  }

  .card:hover {
    border-color: var(--blue);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(27,99,224,0.12);
  }

  .thumb-wrap {
    position: relative;
    aspect-ratio: 16 / 10;
    background: var(--panel);
    overflow: hidden;
  }

  .thumb-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .thumb-fallback {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .rating-pill {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(2px);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 24px;
    font-weight: 500;
    color: var(--text);
  }

  .expired-badge {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(16, 35, 63, 0.45);
    z-index: 2;
  }

  .expired-badge span {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 20px;
    color: #FFFFFF;
    background: var(--hot);
    padding: 6px 18px;
    border-radius: 6px;
    transform: rotate(-8deg);
    box-shadow: 0 4px 14px rgba(228, 87, 46, 0.5);
  }

  .card.is-expired .thumb-wrap img {
    filter: grayscale(60%);
    opacity: 0.6;
  }

  .body { padding: 14px 16px 16px; }

  .heat-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .heat-meter {
    flex: 1;
    height: 10px;
    border-radius: 5px;
    background: var(--line);
    overflow: hidden;
  }

  .heat-count {
    flex-shrink: 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .heat-fill {
    height: 100%;
    border-radius: 5px;
  }

  .heat-fill.hot { box-shadow: 0 0 8px var(--hot); animation: pulse 1.8s ease-in-out infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .title {
    font-size: 14.5px;
    line-height: 1.35;
    font-weight: 500;
    margin: 0 0 10px;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    color: var(--text-dim);
  }

  .meta .go {
    color: var(--blue);
  }

  .archived-tag {
    color: var(--text-dim);
    font-style: italic;
  }

  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }

  /* Favorite toggle (checkbox) on each card */
  .fav-toggle {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 46px;
    height: 46px;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(2px);
    border: 1px solid var(--line);
    border-radius: 999px;
    cursor: pointer;
  }

  .fav-toggle input {
    position: absolute;
    inset: 0;
    opacity: 0;
    margin: 0;
    cursor: pointer;
  }

  .fav-toggle .fav-star {
    font-size: 23px;
    line-height: 1;
    color: var(--text-dim);
    transition: color 0.15s ease, transform 0.15s ease;
    pointer-events: none;
  }

  .fav-toggle input:checked ~ .fav-star {
    color: var(--warm);
    transform: scale(1.1);
  }

  /* Favorites box — sits as the first item inside the main grid */
  .fav-box {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .fav-box-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .fav-box-title {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-size: 13px;
    color: var(--text);
  }

  .fav-box-count {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 400;
    color: var(--text-dim);
    margin-left: 4px;
  }

  .clear-btn {
    background: #FFFFFF;
    border: 1px solid var(--line);
    color: var(--hot);
    border-radius: 6px;
    padding: 6px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .clear-btn:hover { border-color: var(--hot); background: #FDEEE9; }

  /* Same card component as the main grid, just a slightly narrower min-width
     (~90%) so multiple fit side by side inside the box before wrapping. */
  .fav-box-items {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(234px, 1fr));
    gap: 14px;
  }

  @media (max-width: 700px) {
    .fav-box { grid-column: 1 / -1 !important; }
  }

  @media (prefers-reduced-motion: reduce) {
    .heat-fill.hot { animation: none; }
    .card { transition: none; }
  }
</style>
</head>

<body>

<header>
  <div class="eyebrow-row">
    <p class="eyebrow">Slickdeals · Frontpage · Auto-refreshed every 15 min</p>
    <div class="updated-row">
      <span id="lastUpdated">Last updated: —</span>
      <button class="refresh-btn" id="refreshBtn" type="button">Refresh</button>
    </div>
  </div>
  <h1>Slick Deals Tracker</h1>
  <p class="sub">Deal heat = current thumbs-up score. Click any card to open the Slickdeals post.</p>
</header>

<main>
  <div class="controls">
    <div class="tabs" id="tabs">
      <button class="tab-btn" data-hours="2">2 Hours</button>
      <button class="tab-btn" data-hours="5">5 Hours</button>
      <button class="tab-btn" data-hours="24">24 Hours</button>
      <button class="tab-btn" data-hours="48">48 Hours</button>
    </div>
    <div class="sort">
      <span>Sort</span>
      <button class="sort-btn" data-sort="date">Newest</button>
      <button class="sort-btn" data-sort="rating">Rating</button>
    </div>
  </div>

  <p class="count" id="count"></p>
  <div class="grid" id="grid"></div>
</main>

<script>
const DATA_URL = 'deals.xml';

let allDeals = [];
let activeHours = 2;
let activeSort = 'date';
let lastGeneratedIso = null;

const FAVORITES_KEY = 'slickdeals_favorites';

// favorites maps link -> full deal snapshot (title, thumbnail, rating, etc.)
// so a favorited deal still renders correctly even after it ages out of
// deals.xml and is no longer part of allDeals.
function loadFavorites() {
  try {
    const raw = JSON.parse(localStorage.getItem(FAVORITES_KEY) || 'null');
    const map = new Map();
    if (Array.isArray(raw)) {
      // Legacy format from an earlier version: just an array of links, no
      // snapshot data available yet. It'll self-heal once the deal is seen
      // again in allDeals (see getFavoriteDeals).
      raw.forEach(link => { if (typeof link === 'string') map.set(link, { link }); });
    } else if (raw && typeof raw === 'object') {
      Object.values(raw).forEach(deal => {
        if (deal && deal.link) map.set(deal.link, deal);
      });
    }
    return map;
  } catch {
    return new Map();
  }
}

let favorites = loadFavorites();

function saveFavorites() {
  const obj = {};
  favorites.forEach((deal, link) => { obj[link] = deal; });
  localStorage.setItem(FAVORITES_KEY, JSON.stringify(obj));
}

function escapeAttr(str) {
  return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function toggleFavorite(link, isChecked) {
  if (isChecked) {
    const deal = allDeals.find(d => d.link === link);
    favorites.set(link, deal || { link });
  } else {
    favorites.delete(link);
  }
  saveFavorites();
  render();
}

function clearFavorites() {
  favorites.clear();
  saveFavorites();
  render();
}

// Returns { deal, archived } for every favorite: live data (kept fresh in
// storage) while the deal is still in the feed, or the last saved snapshot
// once it ages out and disappears from deals.xml.
function getFavoriteDeals() {
  const result = [];
  let changed = false;

  favorites.forEach((storedDeal, link) => {
    const live = allDeals.find(d => d.link === link);
    if (live) {
      if (JSON.stringify(live) !== JSON.stringify(storedDeal)) {
        favorites.set(link, live);
        changed = true;
      }
      result.push({ deal: live, archived: false });
    } else {
      result.push({ deal: storedDeal, archived: true });
    }
  });

  if (changed) saveFavorites();
  return result;
}

async function loadDeals() {
  // Cache-bust both the browser cache and any CDN/proxy cache (e.g. GitHub
  // Pages) by putting a unique query string on every request.
  const bustUrl = `${DATA_URL}?v=${Date.now()}`;
  const res = await fetch(bustUrl, { cache: 'no-store' });
  const text = await res.text();
  const xml = new DOMParser().parseFromString(text, 'application/xml');

  const parseErr = xml.querySelector('parsererror');
  if (parseErr) {
    console.error('Failed to parse deals.xml', parseErr.textContent);
    return [];
  }

  lastGeneratedIso = xml.documentElement.getAttribute('generated');
  updateLastUpdatedLabel();

  return Array.from(xml.querySelectorAll('deal')).map(el => {
    const get = tag => (el.querySelector(tag)?.textContent || '').trim();
    const rating = parseInt(get('rating'), 10);
    return {
      title: get('title'),
      link: get('link'),
      thumbnail: get('thumbnail'),
      rating: Number.isFinite(rating) ? rating : 0,
      pubDateIso: get('pubDateIso'),
      expired: get('expired').toLowerCase() === 'true',
    };
  }).filter(d => d.link && d.pubDateIso);
}

function heatClass(rating) {
  if (rating >= 50) return 'hot';
  if (rating >= 20) return 'warm';
  return 'cool';
}

function heatColor(rating) {
  if (rating >= 50) return 'var(--hot)';
  if (rating >= 20) return 'var(--warm)';
  return 'var(--cool)';
}

function relativeTime(iso) {
  const then = new Date(iso).getTime();
  const diffMin = Math.max(0, Math.round((Date.now() - then) / 60000));
  if (diffMin < 1) return 'just now';
  if (diffMin < 60) return `${diffMin}m ago`;
  const diffHr = Math.floor(diffMin / 60);
  if (diffHr < 24) return `${diffHr}h ${diffMin % 60}m ago`;
  const diffDay = Math.floor(diffHr / 24);
  return `${diffDay}d ${diffHr % 24}h ago`;
}

function updateLastUpdatedLabel() {
  const el = document.getElementById('lastUpdated');
  if (!lastGeneratedIso) {
    el.textContent = 'Last updated: unknown';
    return;
  }
  el.textContent = `Last updated: ${relativeTime(lastGeneratedIso)}`;
}

function cardHtml(d, opts = {}) {
  const pct = Math.min(100, Math.max(6, (d.rating / 250) * 100));
  const hClass = heatClass(d.rating);
  const hColor = heatColor(d.rating);
  const isFav = favorites.has(d.link);
  // NOTE: onerror replaces only the <img> itself (this.outerHTML), never
  // this.parentElement -- replacing the parent would also wipe out the
  // sibling .rating-pill sitting next to the image.
  const thumbHtml = d.thumbnail
    ? `<img src="${d.thumbnail}" alt="" loading="lazy" onload="this.parentElement.style.aspectRatio=this.naturalWidth+'/'+this.naturalHeight" onerror="this.outerHTML='<div class=&quot;thumb-fallback&quot;>No Image</div>'">`
    : `<div class="thumb-fallback">No Image</div>`;

  return `
    <a class="card${d.expired ? ' is-expired' : ''}" href="${d.link}" target="_blank" rel="noopener noreferrer">
      <div class="thumb-wrap">
        ${thumbHtml}
        <label class="fav-toggle" title="Favorite" onclick="event.stopPropagation();">
          <input type="checkbox" ${isFav ? 'checked' : ''} onclick="event.stopPropagation();" onchange="toggleFavorite('${escapeAttr(d.link)}', this.checked)">
          <span class="fav-star">★</span>
        </label>
        ${d.expired ? '<div class="expired-badge"><span>Expired</span></div>' : ''}
        <div class="rating-pill">▲ ${d.rating}</div>
      </div>
      <div class="body">
        <div class="heat-row">
          <div class="heat-meter"><div class="heat-fill ${hClass}" style="width:${pct}%; background:${hColor};"></div></div>
          <span class="heat-count">${d.rating} thumbs</span>
        </div>
        <p class="title">${d.title}</p>
        <div class="meta">
          <span>${relativeTime(d.pubDateIso)}${opts.archived ? ' · <span class="archived-tag">saved</span>' : ''}</span>
          <span class="go">View deal ↗</span>
        </div>
      </div>
    </a>

  `;
}

function favBoxHtml(favEntries) {
  // Box grows one column-track wider per favorite (capped at 3) so a single
  // favorite doesn't reserve a big empty area -- extra favorites beyond that
  // just wrap onto additional rows inside the box, left to right.
  const span = Math.min(favEntries.length, 3);

  return `
    <div class="fav-box" style="grid-column: span ${span};">
      <div class="fav-box-header">
        <span class="fav-box-title">★ Favorites<span class="fav-box-count">(${favEntries.length})</span></span>
        <button class="clear-btn" type="button" onclick="clearFavorites()">Clear</button>
      </div>
      <div class="fav-box-items">
        ${favEntries.map(f => cardHtml(f.deal, { archived: f.archived })).join('')}
      </div>
    </div>
  `;
}

function render() {
  const cutoff = Date.now() - activeHours * 60 * 60 * 1000;
  let visible = allDeals.filter(d => new Date(d.pubDateIso).getTime() >= cutoff);

  visible.sort((a, b) => {
    if (activeSort === 'rating') return b.rating - a.rating;
    return new Date(b.pubDateIso) - new Date(a.pubDateIso);
  });

  const grid = document.getElementById('grid');
  const count = document.getElementById('count');
  count.textContent = `${visible.length} deal${visible.length === 1 ? '' : 's'} in the last ${activeHours}h`;

  const favEntries = getFavoriteDeals();
  const favBox = favEntries.length > 0 ? favBoxHtml(favEntries) : '';

  if (visible.length === 0) {
    grid.innerHTML = favBox + `<div class="empty" style="grid-column: 1 / -1;">No deals in this window yet. The feed updates every 15 minutes.</div>`;
    return;
  }

  grid.innerHTML = favBox + visible.map(cardHtml).join('');
}

function setupControls() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    if (parseInt(btn.dataset.hours, 10) === activeHours) btn.classList.add('active');
    btn.addEventListener('click', () => {
      activeHours = parseInt(btn.dataset.hours, 10);
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
      render();
    });
  });

  document.querySelectorAll('.sort-btn').forEach(btn => {
    if (btn.dataset.sort === activeSort) btn.classList.add('active');
    btn.addEventListener('click', () => {
      activeSort = btn.dataset.sort;
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b === btn));
      render();
    });
  });

  const refreshBtn = document.getElementById('refreshBtn');
  refreshBtn.addEventListener('click', async () => {
    refreshBtn.disabled = true;
    refreshBtn.textContent = 'Refreshing…';
    allDeals = await loadDeals();
    render();
    refreshBtn.disabled = false;
    refreshBtn.textContent = 'Refresh';
  });
}

(async function init() {
  setupControls();
  allDeals = await loadDeals();
  render();

  // Pick up new commits from the workflow without a manual reload.
  setInterval(async () => {
    allDeals = await loadDeals();
    render();
  }, 5 * 60 * 1000);

  // Keep the "Last updated: Xm ago" label ticking even between fetches.
  setInterval(updateLastUpdatedLabel, 30 * 1000);
})();
</script>

</body>
</html>
